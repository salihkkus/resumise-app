name: Build AI Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag resumise-ai-engine:latest \
            .

      - name: Show built image
        run: docker images resumise-ai-engine --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
